<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Lista Transporte</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h2>GARANTA SUA VAGA</h2>

  <!-- INPUT PRIMEIRO -->
  <p class="instrucao">Digite seu nome para entrar na lista:</p>

  <input type="text" id="nome" placeholder="Digite seu nome">
  <button onclick="adicionarNome()">Entrar na lista</button>

  <p id="msgConfirmacao" class="msg-confirmacao"></p>

  <!-- PIX DEPOIS -->
  <div class="pix-box">
    <div class="pix-card">
      <span class="pix-label">CHAVE PIX</span>

      <div class="pix-row">
        <span class="pix-key" id="pixKey">11999999999</span>
        <button class="pix-copy-btn" onclick="copiarPix()">Copiar</button>
      </div>

      <span class="pix-owner">Nome do Responsável</span>
      <p class="pix-msg" id="pixMsg"></p>
    </div>
  </div>

  <!-- LISTA POR ÚLTIMO -->
  <p class="msg-atualizacao">LISTA ATUALIZADA</p>
  <p class="explicacao">Vaga confirmada mediante metade do valor pago.</p>

  <ol id="lista"></ol>

</div>

<script src="script.js"></script>
</body>
</html>
